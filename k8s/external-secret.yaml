# Using External Secrets Operator to sync from AWS Secrets Manager
# Requires: external-secrets-operator installed and ClusterSecretStore configured
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: twc-recommendations-secrets
  namespace: recommendations
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: twc-recommendations-secrets
    creationPolicy: Owner
  data:
    - secretKey: CLICKHOUSE_PASSWORD
      remoteRef:
        key: twc/recommendations/clickhouse
        property: password
